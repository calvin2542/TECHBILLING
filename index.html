<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration Dashboard</title>
  <link rel="stylesheet" href="administration.css">
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════ -->
  <header class="admin-header">
    <div class="header-left">
      <div class="logo-circle">
        <svg class="web-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <button class="nav-toggle" id="navToggleBtn" aria-label="Toggle Navigation">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
    </div>
    <div class="vertical-divider"></div>
    <div class="header-main">
      <h1 class="brand-title">COBU-TECH INDUSTRIES NETWORKING</h1>
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search...">
      </div>
      <!-- Quick Actions -->
      <div class="quick-actions-wrapper">
        <button class="quick-actions-btn" id="quickActionsBtn">
          <svg style="width:13px;height:13px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Quick Actions
          <span class="qa-arrow">▼</span>
        </button>
        <div class="quick-actions-menu" id="quickActionsMenu">
          <div class="qa-menu-title">Your Shortcuts</div>
          <a class="qa-menu-link" href="data-page.html?page=activate-user" data-page-id="activate-user">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Activation
          </a>
          <a class="qa-menu-link" href="data-page.html?page=users" data-page-id="users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Customers
          </a>
          <a class="qa-menu-link" href="data-page.html?page=prepaid-users" data-page-id="prepaid-users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Prepaid Users
          </a>
          <a class="qa-menu-link" href="data-page.html?page=routers" data-page-id="routers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="6" rx="1"/><rect x="2" y="9" width="20" height="6" rx="1"/><rect x="2" y="16" width="20" height="6" rx="1"/><circle cx="6" cy="5" r="1" fill="currentColor"/><circle cx="6" cy="12" r="1" fill="currentColor"/><circle cx="6" cy="19" r="1" fill="currentColor"/></svg>
            Routers
          </a>
          <a class="qa-menu-link" href="data-page.html?page=online-users" data-page-id="online-users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
            Online Users
          </a>
          <a class="qa-menu-link" href="data-page.html?page=active-sessions" data-page-id="active-sessions">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Active Sessions
          </a>
          <div class="qa-menu-divider"></div>
          <a class="qa-menu-link manage" href="data-page.html?page=general-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9z"/></svg>
            Manage Quick Actions
          </a>
        </div>
      </div>
    </div>
    <div class="header-right">
      <svg class="notification-bell" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
      </svg>
      <div class="admin-profile-circle">
        <img id="admin-profile-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%230a192f'/%3E%3Ccircle cx='20' cy='16' r='7' fill='%234b5563'/%3E%3Cellipse cx='20' cy='34' rx='12' ry='8' fill='%234b5563'/%3E%3C/svg%3E" alt="Admin Profile">
      </div>
      <div class="admin-meta-row">
        <div class="admin-name-glow"><div class="admin-name-box" id="admin-name">Admin</div></div>
        <div class="admin-status-glow"><div class="admin-status-dot"></div></div>
      </div>
    </div>
  </header>

  <!-- ═══ WRAPPER ═══════════════════════════════════════════════ -->
  <div class="admin-wrapper">

    <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
    <aside class="sidebar-panel" id="sidebarPanel">
      <div class="sidebar-header">
        <button class="close-panel-btn" id="closePanelBtn">&lt;</button>
      </div>
      <div class="sidebar-nav-container">
        <div class="sidebar-search-box">
          <svg class="sidebar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search menu..." class="sidebar-search-input">
        </div>
        <nav class="sidebar-menu" id="sidebarMenu"><!-- built by administration.js --></nav>
      </div>
    </aside>

    <!-- ══ MAIN CONTENT ════════════════════════════════════════ -->
    <main class="main-content" id="mainContent">
      <!-- built by administration.js based on URL -->
    </main>

  </div><!-- /.admin-wrapper -->

  <!-- ═══ FOOTER ════════════════════════════════════════════════ -->
  <footer class="admin-footer">
    <div class="footer-content">
      <p class="copyright">&copy; 2026 COBU-TECH INDUSTRIES NETWORKING. All rights reserved.</p>
    </div>
  </footer>

  <script src="administration.js"></script>
</body>
</html>
